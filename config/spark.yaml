# Defaults live in config/*.yaml.
# .env is reserved for secrets, endpoints, and deployment/runtime overrides.

app_name: kg-construct-phase2
worker_count: 1

executor:
  instances: 1
  cores: 2
  memory: 4g

driver:
  memory: 2g

shuffle_partitions: 8
default_parallelism: 4

sql:
  adaptive_enabled: true

submit:
  deploy_mode: client

packages:
  s3a_enabled: true
